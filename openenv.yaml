# OpenEnv Environment Specification
# Restaurant Manager — AI-driven Indian restaurant shift management

name: restaurant-manager
version: "1.2.0"
description: >
  A restaurant shift management environment set in an Indian restaurant context,
  where an AI agent makes real-time decisions about staffing, menu availability,
  pricing, inventory reorders, and promotions to maximize profit while maintaining
  customer satisfaction and service quality across a 12-step shift. The environment
  includes event-driven demand shocks, stockout pressure, and efficiency tradeoffs
  across eight scenarios.

tags:
  - openenv
  - restaurant
  - management
  - real-world
  - indian-market


observation:
  type: object
  model: env.models.RestaurantState
  description: >
    Full restaurant state including step number, time, demand level,
    customer rating, revenue, costs, active orders, staff roster (8 staff
    across chef/server/dishwasher roles), menu items (6 dishes), and
    inventory levels (8 ingredients).

action:
  type: object
  model: env.models.AgentAction
  description: >
    Manager decisions: staff_changes (call in/send home by name),
    menu_changes (enable/disable items), price_adjustments (new selling price),
    reorder_inventory (emergency orders at 1.5x cost), and promotion_active
    (15% discount that boosts demand by 30%).

reward:
  type: float
  range: [-1.0, 1.0]
  description: >
    Per-step reward combining normalized profit, customer rating trajectory,
    and service reliability, with explicit penalties for failures, stockouts,
    capacity misses, labor inefficiency, and expensive reorders. Dense signal
    is available every step. Final graded score normalized to [0.0, 1.0].


tasks:
  - id: weekday_lunch
    name: Weekday Lunch Service
    description: >
      Stable weekday lunch shift with normal demand (1.0–1.5x), full inventory,
      and good starting rating (4.3). The agent learns basic resource allocation.
      Target: profit ≥ ₹8,000, rating ≥ 4.2, service rate ≥ 80%.
    difficulty: easy
    max_steps: 12
    success_threshold: 0.60

  - id: weekend_rush
    name: Weekend Festival Rush
    description: >
      High-demand weekend shift (up to 2.5x) starting with a damaged rating (3.5)
      and a large party arriving at step 4. Best chef is unavailable.
      Agent must handle surge demand while recovering customer satisfaction.
      Target: profit ≥ ₹12,000, rating ≥ 4.0, service rate ≥ 75%.
    difficulty: medium
    max_steps: 12
    success_threshold: 0.60

  - id: crisis_shift
    name: Crisis Management Shift
    description: >
      Ingredient costs doubled (supply chain crisis), inventory at 40% normal,
      health inspection at step 8, and competitor pressure reducing demand.
      Agent must manage finances, quality, and regulatory compliance simultaneously.
      Target: profit ≥ ₹5,000, rating ≥ 4.0, service rate ≥ 70%.
    difficulty: hard
    max_steps: 12
    success_threshold: 0.60

  - id: monsoon_delivery_crunch
    name: Monsoon Delivery Crunch
    description: >
      Heavy rain shifts demand into a dinner delivery rush, and a supplier delay
      shrinks available inventory mid-service.
      Target: profit ≥ ₹9,000, rating ≥ 4.1, service rate ≥ 78%.
    difficulty: medium
    max_steps: 12
    success_threshold: 0.62

  - id: wedding_catering_chaos
    name: Wedding Catering Chaos
    description: >
      Premium evening demand culminates in a VIP visit and large group arrival.
      The agent must protect throughput and margin without allowing late-stage collapse.
      Target: profit ≥ ₹15,000, rating ≥ 4.1, service rate ≥ 82%.
    difficulty: hard
    max_steps: 12
    success_threshold: 0.65

  - id: office_catering_lunch
    name: Office Catering Lunch
    description: >
      A dependable corporate lunch block creates concentrated midday demand and
      rewards smooth kitchen throughput with minimal overstaffing.
      Target: profit ≥ ₹10,000, rating ≥ 4.25, service rate ≥ 84%.
    difficulty: easy
    max_steps: 12
    success_threshold: 0.63

  - id: tourist_season_dinner
    name: Tourist Season Dinner
    description: >
      An evening tourist wave raises willingness to pay, but late-service delays
      can quickly erode ratings and future demand.
      Target: profit ≥ ₹13,000, rating ≥ 4.15, service rate ≥ 80%.
    difficulty: medium
    max_steps: 12
    success_threshold: 0.64

  - id: staff_shortage_recovery
    name: Staff Shortage Recovery
    description: >
      The shift opens under-staffed and inventory is light, requiring careful
      call-ins, menu pruning, and recovery before compliance pressure hits.
      Target: profit ≥ ₹7,000, rating ≥ 4.0, service rate ≥ 76%.
    difficulty: hard
    max_steps: 12
    success_threshold: 0.61

environment:
  module: env.environment
  class: RestaurantEnv
  methods:
    reset: "reset(task_id: str) -> RestaurantState"
    step: "step(action: AgentAction) -> tuple[RestaurantState, float, bool, dict]"
    state: "state() -> RestaurantState"
  server:
    module: app
    class: FastAPI app
    port: 7860
    endpoints:
      - "GET  /         → browser dashboard"
      - "GET  /play     → browser dashboard alias"
      - "GET  /status   → JSON status metadata"
      - "GET  /health   → health check"
      - "POST /reset    → initialize episode"
      - "POST /step     → execute action"
      - "GET  /state    → current observation"
      - "GET  /tasks    → list available tasks"


inference:
  script: inference.py
  env_vars:
    required:
      - HF_TOKEN
    optional:
      - API_BASE_URL
      - MODEL_NAME
      - TASK
      - VERBOSE
  defaults:
    API_BASE_URL: "https://router.huggingface.co/v1"
    MODEL_NAME: "Qwen/Qwen2.5-72B-Instruct"
    TASK: "all"


grading:
  module: env.graders
  function: grade
  raw_score_range: [0, 100]
  normalized_score_range: [0.0, 1.0]
  deterministic: true
  pillars:
    - name: profit
      description: "Did the restaurant generate profit? Normalized against task-specific target."
    - name: rating
      description: "Customer rating (1–5 stars). Normalized against task-specific target."
    - name: service
      description: "Fraction of orders successfully served. Penalizes high failure rates."
    - name: satisfaction
      description: "Combined satisfaction metric (0–100), 60% rating + 40% service rate."
    - name: efficiency
      description: "Operational efficiency after labor, reorder, stockout, and capacity penalties."
